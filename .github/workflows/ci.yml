name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Desktop app targets all three platforms; test the backend on each.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install native libraries
        # soundfile bundles libsndfile in its macOS/Windows wheels; only Linux
        # needs the system package. sounddevice is mocked in conftest, so no
        # PortAudio anywhere.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install Python dependencies
        # Pinned test-only subset (validates a real requirements file, unlike a
        # hand-typed package list, and keeps GUI/packaging deps out of CI).
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements-test.txt

      - name: Run tests
        run: python -m pytest src/tests -q
        env:
          PYTHONPATH: src

  frontend:
    name: Frontend (build, tests, lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint
