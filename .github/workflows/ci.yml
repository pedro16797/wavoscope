name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install native libraries
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install Python dependencies
        # Test-only subset: the full requirements.txt pulls in GUI/packaging
        # deps (pywebview, pyinstaller) that the test suite never imports.
        # sounddevice is mocked in tests/conftest.py, so PortAudio isn't needed.
        run: |
          python -m pip install --upgrade pip
          pip install numpy soundfile fastapi httpx jsonpatch python-stretch tinytag pytest

      - name: Run tests
        run: PYTHONPATH=src python -m pytest src/tests -q

  frontend:
    name: Frontend (build, tests, lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Lint (advisory)
        # Non-blocking: the codebase has pre-existing lint issues to clean up
        # before this can be a required check.
        run: npm run lint
        continue-on-error: true
